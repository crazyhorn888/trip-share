<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行行程</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">

  <div class="max-w-4xl mx-auto px-4 py-12">
    <div class="mb-10">
      <h1 class="text-3xl font-bold text-gray-900">🌏 旅行行程</h1>
      <p class="text-gray-400 text-sm mt-1">由 Numbers 自動同步</p>
    </div>

    <div id="trips-grid" class="grid gap-5 sm:grid-cols-2">
      <!-- 載入中佔位 -->
      <div class="bg-white rounded-2xl border border-dashed border-gray-200 p-6 flex items-center justify-center text-center">
        <div>
          <div class="text-3xl mb-2 opacity-30">✈️</div>
          <p class="text-sm text-gray-300">載入中...</p>
        </div>
      </div>
    </div>

    <p id="last-sync" class="text-xs text-gray-300 text-center mt-12"></p>
  </div>

  <script>
    const STATUS_COLORS = {
      '規劃中': 'bg-blue-50 text-blue-600',
      '確認中': 'bg-yellow-50 text-yellow-600',
      '已完成': 'bg-green-50 text-green-600',
    };

    function tripCard(trip) {
      const color = STATUS_COLORS[trip.status] || 'bg-gray-50 text-gray-500';
      const yearMonth = (trip.date_range || '').split('–')[0].trim().substring(0, 7).replace('/', ' · ');
      return `
        <a href="./${trip.trip_id}/" class="group bg-white rounded-2xl shadow-sm border border-gray-100 p-6 hover:shadow-md hover:border-blue-100 transition-all">
          <div class="text-3xl mb-3">${trip.emoji || '✈️'}</div>
          <div class="text-xs text-blue-500 font-semibold mb-1 uppercase tracking-wide">${yearMonth}</div>
          <h2 class="text-xl font-bold text-gray-800 mb-1 group-hover:text-blue-600 transition-colors">${trip.trip_name}</h2>
          <p class="text-sm text-gray-400 mb-4">${trip.date_range || ''}</p>
          <div class="flex items-center gap-2">
            <span class="${color} text-xs px-2 py-0.5 rounded-full font-medium">${trip.status || '規劃中'}</span>
          </div>
          <div class="mt-4 text-sm text-blue-500 font-medium group-hover:underline">查看行程 →</div>
        </a>`;
    }

    function placeholder() {
      return `
        <div class="bg-white rounded-2xl border border-dashed border-gray-200 p-6 flex items-center justify-center text-center">
          <div>
            <div class="text-3xl mb-2 opacity-30">✈️</div>
            <p class="text-sm text-gray-300">下一個旅程<br>加入 Numbers 資料夾後自動出現</p>
          </div>
        </div>`;
    }

    fetch('./trips.json')
      .then(r => r.json())
      .then(data => {
        const trips = data.trips || [];
        const grid  = document.getElementById('trips-grid');
        grid.innerHTML = trips.map(tripCard).join('') + placeholder();

        const latest = trips.reduce((acc, t) => (t.last_updated > acc ? t.last_updated : acc), '');
        if (latest) {
          document.getElementById('last-sync').textContent = `最後同步：${latest}`;
        }
      })
      .catch(() => {
        document.getElementById('trips-grid').innerHTML = placeholder();
      });
  </script>

</body>
</html>
